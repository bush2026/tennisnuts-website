<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>My Picks — Tennisnuts Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--green:#3a5c2c;--green-2:#2c4621;--green-3:#4d7239;--green-soft:#eef2e6;--ball:#cddc39;--ball-2:#d8e85a;--ink:#1c2218;--ink-2:#4a5240;--paper:#fff;--cream:#faf8f1;--line:#e6e3d8;}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{font-family:"DM Sans",sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.55;}
h1,h2,h3,h4{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;letter-spacing:-.02em;margin:0;}
p{margin:0;}a{color:inherit;text-decoration:none;}img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:0;background:none;}
.container{max-width:1240px;margin:0 auto;padding:0 28px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 24px;border-radius:999px;font-weight:600;font-size:15px;font-family:"DM Sans",sans-serif;transition:transform .15s,background .15s;white-space:nowrap;cursor:pointer;text-decoration:none;border:none;}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-ghost:hover{background:var(--green-soft);}
.btn-sm{padding:8px 18px;font-size:14px;}

/* SESSION BAR */
.session-bar{background:var(--green-soft);border-bottom:1px solid rgba(58,92,44,.15);padding:10px 0;}
.session-bar .container{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.session-bar .sbar-left{font-size:14px;font-weight:500;color:var(--green-2);}

/* HERO */
.page-hero{background:linear-gradient(155deg,#0e1810 0%,#1c2218 50%,#2c4621 100%);padding:56px 0 48px;color:#fff;position:relative;overflow:hidden;}
.page-hero::after{content:"PICKS";position:absolute;right:-10px;bottom:-20px;font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(80px,16vw,200px);line-height:1;color:#fff;opacity:.03;pointer-events:none;z-index:0;}
.page-hero .container{position:relative;z-index:1;}
.eyebrow-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(205,220,57,.15);border:1px solid rgba(205,220,57,.4);padding:7px 14px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ball);margin-bottom:16px;}
.page-hero h1{font-size:clamp(36px,6vw,64px);line-height:.97;letter-spacing:-.04em;margin-bottom:10px;}
.page-hero .sub{font-size:16px;color:rgba(255,255,255,.75);}

/* TOTAL SCORE */
.score-banner{background:var(--green-soft);border-bottom:1px solid rgba(58,92,44,.12);padding:24px 0;}
.score-banner .container{display:flex;align-items:center;gap:24px;flex-wrap:wrap;}
.score-num{font-family:"Bricolage Grotesque",sans-serif;font-size:3rem;font-weight:800;color:var(--green);line-height:1;}
.score-label{font-size:15px;color:var(--ink-2);font-weight:500;}

/* PICKS TABLE */
.picks-section{padding:56px 0;background:var(--cream);}
.picks-list{display:flex;flex-direction:column;gap:12px;}

.pick-row{background:#fff;border:1px solid var(--line);border-radius:14px;overflow:hidden;}
.pick-row-head{padding:12px 16px;display:grid;grid-template-columns:1fr auto;align-items:center;gap:12px;border-bottom:1px solid var(--line);}
.match-label{font-family:"Bricolage Grotesque",sans-serif;font-size:16px;font-weight:700;letter-spacing:-.01em;}
.lock-badge{font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:600;padding:4px 10px;border-radius:999px;background:var(--green-soft);color:var(--green);}
.lock-badge.locked{background:rgba(0,0,0,.06);color:var(--ink-2);}

.pick-row-body{padding:14px 16px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;align-items:center;}
.pick-col{display:flex;flex-direction:column;gap:3px;}
.pick-col-label{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-2);}
.pick-col-val{font-size:15px;font-weight:600;color:var(--ink);}
.pick-col-val.correct{color:var(--green);}
.pick-col-val.wrong{color:#c0392b;}
.pts-chip{display:inline-flex;align-items:center;font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600;background:var(--ball);color:var(--green-2);padding:4px 12px;border-radius:999px;}
.pts-chip.zero{background:rgba(0,0,0,.06);color:var(--ink-2);}
.pts-chip.pending{background:var(--green-soft);color:var(--green-2);}
.no-pick{font-size:13px;color:var(--ink-2);font-style:italic;}

.empty-state{text-align:center;padding:48px 20px;color:var(--ink-2);}
.empty-state h3{font-size:22px;color:var(--ink);margin-bottom:8px;}
.section-eyebrow{display:inline-flex;align-items:center;gap:10px;color:var(--green);font-weight:600;font-size:13px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px;}
.section-eyebrow::before{content:"";width:24px;height:2px;background:var(--ball);}

@media(max-width:640px){
  .pick-row-body{grid-template-columns:1fr 1fr;gap:12px;}
  .container{padding:0 16px;}
}
@media(max-width:400px){
  .pick-row-body{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="site-nav"></div>

<div class="session-bar">
  <div class="container">
    <div class="sbar-left">Logged in as <strong id="sbar-name">…</strong></div>
    <div style="display:flex;gap:8px">
      <a href="index.html" class="btn btn-ghost btn-sm">← All Matches</a>
      <button class="btn btn-ghost btn-sm" onclick="logout()">Log out</button>
    </div>
  </div>
</div>

<section class="page-hero">
  <div class="container">
    <div class="eyebrow-chip" id="tournament-chip">Loading…</div>
    <h1>My Picks</h1>
    <p class="sub" id="page-sub">Your predictions and points for this edition.</p>
  </div>
</section>

<div class="score-banner" id="score-banner">
  <div class="container">
    <div class="score-num" id="total-pts">—</div>
    <div class="score-label">total points<br><span id="scored-label" style="font-size:13px;color:var(--ink-2)"></span></div>
  </div>
</div>

<section class="picks-section">
  <div class="container">
    <div class="section-eyebrow">Your predictions</div>
    <div class="picks-list" id="picks-list">
      <div class="empty-state"><h3>Loading…</h3></div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../nav.js?v=2"></script>
<script src="../footer.js?v=3"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script>
async function init() {
  const session = await requireAuth(false);
  if (!session) return;

  document.getElementById('sbar-name').textContent = session.display_name;

  // Get active tournament
  const { data: tournaments } = await db.from('tournaments').select('*').eq('is_active', true).limit(1);
  if (!tournaments?.length) {
    document.getElementById('picks-list').innerHTML = '<div class="empty-state"><h3>No active tournament</h3></div>';
    return;
  }
  const tournament = tournaments[0];
  document.getElementById('tournament-chip').textContent = 'Tennisnuts · ' + tournament.name;
  document.getElementById('page-sub').textContent = 'Your predictions and points for ' + tournament.name + '.';

  // Load picks
  const { data: picks } = await db.rpc('get_my_predictions', {
    p_session_token: session.session_token,
    p_tournament_id: tournament.id
  });
  if (!picks?.length) {
    document.getElementById('picks-list').innerHTML = '<div class="empty-state"><h3>No matches yet</h3><p>Check back once matches are added.</p></div>';
    return;
  }

  let totalPts = 0;
  let scoredCount = 0;
  let totalMatches = picks.length;

  const rows = picks.map(p => {
    const locked = new Date(p.lock_time) <= Date.now();
    const hasResult = !!p.result_winner;
    const hasPick = !!p.pick_winner;

    let pts = null;
    if (p.points_awarded !== null && p.points_awarded !== undefined) {
      pts = p.points_awarded;
      totalPts += pts;
      scoredCount++;
    }

    let winnerClass = '';
    if (hasResult && hasPick) {
      winnerClass = p.pick_winner === p.result_winner ? 'correct' : 'wrong';
    }

    let ptsChip = '';
    if (hasResult && hasPick) {
      ptsChip = `<span class="pts-chip${pts===0?' zero':''}">${pts} pts</span>`;
    } else if (hasPick) {
      ptsChip = `<span class="pts-chip pending">pending</span>`;
    } else {
      ptsChip = `<span class="no-pick">—</span>`;
    }

    const resultCol = hasResult
      ? `<div class="pick-col-label">Result</div><div class="pick-col-val">${esc(p.result_winner)} ${p.result_set_score||''}</div>`
      : `<div class="pick-col-label">Result</div><div class="pick-col-val" style="color:var(--ink-2);font-size:13px">Not played</div>`;

    return `<div class="pick-row">
      <div class="pick-row-head">
        <div class="match-label">${esc(p.player1)} vs ${esc(p.player2)}</div>
        <span class="lock-badge${locked?' locked':''}">${locked ? '🔒 Locked' : '🕐 ' + fmtDate(p.lock_time)}</span>
      </div>
      <div class="pick-row-body">
        <div class="pick-col">
          <div class="pick-col-label">Your pick</div>
          ${hasPick
            ? `<div class="pick-col-val ${winnerClass}">${esc(p.pick_winner)}${p.pick_set_score ? ' · '+p.pick_set_score : ''}</div>`
            : `<span class="no-pick">No pick submitted</span>`}
        </div>
        <div class="pick-col">${resultCol}</div>
        <div class="pick-col">
          <div class="pick-col-label">Points</div>
          ${ptsChip}
        </div>
      </div>
    </div>`;
  });

  document.getElementById('picks-list').innerHTML = rows.join('');
  document.getElementById('total-pts').textContent = totalPts;
  document.getElementById('scored-label').textContent = `${scoredCount} of ${totalMatches} matches scored`;
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

init();
</script>
</body>
</html>
