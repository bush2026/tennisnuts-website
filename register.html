<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Register — Tennisnuts</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--green:#3a5c2c;--green-2:#2c4621;--green-3:#4d7239;--green-soft:#eef2e6;--ball:#cddc39;--ball-2:#d8e85a;--ink:#1c2218;--ink-2:#4a5240;--paper:#fff;--cream:#faf8f1;--line:#e6e3d8;}
*,*::before,*::after{box-sizing:border-box;}
html,body{margin:0;padding:0;overflow-x:hidden;}
body{font-family:"DM Sans",sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;font-size:17px;line-height:1.55;}
h1,h2,h3,h4{font-family:"Bricolage Grotesque",sans-serif;font-weight:700;letter-spacing:-.02em;margin:0;}
p{margin:0;}a{color:inherit;text-decoration:none;}img,svg{display:block;max-width:100%;}
button{font-family:inherit;cursor:pointer;border:0;background:none;}
.container{max-width:1100px;margin:0 auto;padding:0 28px;}
.btn{display:inline-flex;align-items:center;gap:8px;padding:13px 26px;border-radius:999px;font-weight:600;font-size:15px;font-family:"DM Sans",sans-serif;transition:transform .15s,background .15s;white-space:nowrap;cursor:pointer;text-decoration:none;border:none;}
.btn-green{background:var(--green);color:#fff;}
.btn-green:hover{background:var(--green-2);transform:translateY(-1px);}
.btn-ghost{background:transparent;color:var(--ink);border:1.5px solid var(--line);}
.btn-ghost:hover{background:var(--green-soft);}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important;}

/* HERO */
.reg-hero{background:linear-gradient(155deg,#0e1810 0%,#1c2218 50%,#2c4621 100%);padding:56px 0 48px;color:#fff;position:relative;overflow:hidden;}
.reg-hero::after{content:"REGISTER";position:absolute;right:-10px;bottom:-20px;font-family:"Bricolage Grotesque",sans-serif;font-weight:800;font-size:clamp(60px,14vw,180px);line-height:1;color:#fff;opacity:.03;pointer-events:none;}
.reg-hero .container{position:relative;z-index:1;}
.eyebrow-chip{display:inline-flex;align-items:center;gap:8px;background:rgba(205,220,57,.15);border:1px solid rgba(205,220,57,.4);padding:7px 14px;border-radius:999px;font-family:"JetBrains Mono",monospace;font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--ball);margin-bottom:16px;}
.reg-hero h1{font-size:clamp(32px,5vw,58px);line-height:1;letter-spacing:-.03em;margin-bottom:10px;}
.reg-hero .meta{font-size:14px;color:rgba(255,255,255,.6);display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:12px;}
.reg-hero .meta strong{color:rgba(255,255,255,.88);}
.status-chip{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:600;font-family:"JetBrains Mono",monospace;letter-spacing:.06em;}
.status-open{background:rgba(205,220,57,.2);color:var(--ball);}
.status-closed{background:rgba(255,255,255,.1);color:rgba(255,255,255,.5);}

/* LAYOUT */
.reg-body{background:var(--cream);padding:56px 0 80px;}
.reg-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start;}

/* FORM CARD */
.form-card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;}
.form-card-head{background:var(--ink);padding:18px 24px;}
.form-card-head h2{color:#fff;font-size:20px;letter-spacing:-.02em;}
.form-card-head p{color:rgba(255,255,255,.55);font-size:13px;margin-top:4px;}
.form-card-body{padding:24px;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:6px;letter-spacing:.05em;text-transform:uppercase;}
.field input,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:"DM Sans",sans-serif;font-size:15px;color:var(--ink);background:#fff;outline:none;transition:border-color .15s;}
.field input:focus,.field textarea:focus{border-color:var(--green);}
.field-hint{font-size:12px;color:var(--ink-2);margin-top:4px;}
.form-err{color:#c0392b;font-size:13px;font-weight:600;margin-top:12px;display:none;}
.success-state{text-align:center;padding:32px 20px;}
.success-state .check{font-size:48px;margin-bottom:12px;}
.success-state h3{font-size:22px;color:var(--green);margin-bottom:8px;}
.success-state p{font-size:15px;color:var(--ink-2);}
.closed-notice{background:var(--cream);border:1px solid var(--line);border-radius:12px;padding:20px 24px;text-align:center;color:var(--ink-2);font-size:15px;}
.closed-notice strong{display:block;font-size:17px;color:var(--ink);margin-bottom:6px;}

/* ENTRIES CARD */
.entries-card{background:#fff;border:1px solid var(--line);border-radius:20px;overflow:hidden;position:sticky;top:20px;}
.entries-card-head{padding:18px 24px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:var(--cream);}
.entries-card-head h2{font-size:18px;letter-spacing:-.01em;}
.count-chip{font-family:"JetBrains Mono",monospace;font-size:13px;font-weight:600;background:var(--green);color:#fff;padding:4px 12px;border-radius:999px;}
.entries-list{max-height:480px;overflow-y:auto;}
.entry-row{display:flex;align-items:center;gap:12px;padding:12px 20px;border-bottom:1px solid var(--line);}
.entry-row:last-child{border-bottom:none;}
.entry-num{font-family:"JetBrains Mono",monospace;font-size:11px;color:var(--ink-2);width:22px;flex-shrink:0;}
.entry-name{font-size:15px;font-weight:500;}
.entry-time{font-size:11px;color:var(--ink-2);margin-left:auto;font-family:"JetBrains Mono",monospace;flex-shrink:0;}
.entries-empty{padding:32px 20px;text-align:center;color:var(--ink-2);font-size:14px;}
.capacity-bar{padding:14px 20px;border-top:1px solid var(--line);background:var(--cream);}
.cap-track{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:6px;}
.cap-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s ease;}
.cap-label{font-size:12px;color:var(--ink-2);display:flex;justify-content:space-between;}

/* OPEN EVENTS LIST (no specific event) */
.open-events{padding:56px 0 80px;background:var(--cream);}
.events-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px;margin-top:32px;}
.event-card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:24px;transition:box-shadow .2s,transform .2s;cursor:pointer;text-decoration:none;display:block;color:var(--ink);}
.event-card:hover{box-shadow:0 12px 32px -12px rgba(28,34,24,.18);transform:translateY(-4px);}
.event-card .type-chip{font-family:"JetBrains Mono",monospace;font-size:9px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:4px 10px;border-radius:999px;background:var(--green-soft);color:var(--green);margin-bottom:12px;display:inline-block;}
.event-card h3{font-size:20px;letter-spacing:-.02em;margin-bottom:8px;}
.event-card .ev-meta{font-size:13px;color:var(--ink-2);display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.event-card .ev-cta{display:inline-flex;align-items:center;gap:6px;font-size:14px;font-weight:600;color:var(--green);}

@media(max-width:760px){
  .reg-grid{grid-template-columns:1fr;}
  .entries-card{position:static;}
  .container{padding:0 16px;}
  .reg-hero{padding:40px 0 36px;}
}
</style>
</head>
<body>

<div id="site-nav"></div>

<!-- HERO -->
<section class="reg-hero">
  <div class="container">
    <div class="eyebrow-chip" id="hero-chip">Tennisnuts · Register</div>
    <h1 id="hero-title">Event Registration</h1>
    <div class="meta" id="hero-meta"></div>
  </div>
</section>

<!-- CONTENT: single event view -->
<div id="single-event-view" style="display:none">
  <div class="reg-body">
    <div class="container">
      <div class="reg-grid">
        <!-- Form -->
        <div>
          <div class="form-card" id="form-card">
            <div class="form-card-head">
              <h2>Your details</h2>
              <p>Takes 30 seconds · No account needed</p>
            </div>
            <div class="form-card-body" id="form-body">
              <div class="field"><label>Full name</label><input id="f-name" type="text" placeholder="Rahul Sharma" autocomplete="name"/></div>
              <div class="field">
                <label>WhatsApp number</label>
                <input id="f-phone" type="tel" placeholder="9881125831" autocomplete="tel"/>
                <div class="field-hint">We'll use this to confirm your spot on WhatsApp</div>
              </div>
              <div class="field"><label>Email <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><input id="f-email" type="email" placeholder="rahul@email.com" autocomplete="email"/></div>
              <div class="field"><label>Message <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label><textarea id="f-notes" rows="2" placeholder="Any preference or note for the organiser…"></textarea></div>
              <button class="btn btn-green" style="width:100%;justify-content:center;margin-top:4px" id="submit-btn" onclick="submitEntry()">Confirm registration</button>
              <div class="form-err" id="form-err"></div>
            </div>
          </div>
        </div>

        <!-- Entries -->
        <div>
          <div class="entries-card">
            <div class="entries-card-head">
              <h2>Who's in</h2>
              <span class="count-chip" id="count-chip">0</span>
            </div>
            <div class="entries-list" id="entries-list">
              <div class="entries-empty">Loading…</div>
            </div>
            <div class="capacity-bar" id="capacity-bar" style="display:none">
              <div class="cap-label"><span>Spots filled</span><span id="cap-text"></span></div>
              <div class="cap-track"><div class="cap-fill" id="cap-fill" style="width:0%"></div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CONTENT: list of open events (no event param) -->
<div id="all-events-view" style="display:none">
  <div class="open-events">
    <div class="container">
      <div class="eyebrow-chip" style="background:rgba(58,92,44,.08);border-color:rgba(58,92,44,.2);color:var(--green);margin-bottom:0">Open now</div>
      <h2 style="font-size:clamp(28px,4vw,42px);letter-spacing:-.03em;margin-top:12px">Register for an event</h2>
      <div class="events-grid" id="events-grid">
        <div style="color:var(--ink-2);font-size:15px">Loading…</div>
      </div>
    </div>
  </div>
</div>

<div id="site-footer"></div>

<script src="/nav.js?v=4"></script>
<script src="/footer.js?v=9"></script>
<script src="/predictions/config.js"></script>
<script>
let currentEvent = null;
let entries = [];

async function init() {
  const params = new URLSearchParams(window.location.search);
  const eventId = params.get('event');

  if (eventId) {
    await loadSingleEvent(eventId);
  } else {
    await loadAllEvents();
  }
}

async function loadSingleEvent(eventId) {
  const [evRes, enRes] = await Promise.all([
    db.rpc('get_event_details', { p_event_id: eventId }),
    db.rpc('get_event_registrations', { p_event_id: eventId })
  ]);

  if (!evRes.data?.length) {
    document.getElementById('hero-title').textContent = 'Event not found';
    document.getElementById('single-event-view').style.display = '';
    document.getElementById('form-body').innerHTML = '<p style="color:var(--ink-2)">This registration link is not valid.</p>';
    return;
  }

  currentEvent = evRes.data[0];
  entries = enRes.data || [];

  const isOpen = currentEvent.is_open && (!currentEvent.closes_at || new Date(currentEvent.closes_at) > Date.now());

  // Hero
  document.title = currentEvent.name + ' — Register · Tennisnuts';
  document.getElementById('hero-chip').textContent = 'Tennisnuts · ' + capitalize(currentEvent.event_type);
  document.getElementById('hero-title').textContent = currentEvent.name;
  const metaParts = [];
  if (currentEvent.event_date) metaParts.push('<strong>' + fmtEventDate(currentEvent.event_date) + '</strong>');
  if (currentEvent.venue) metaParts.push(esc(currentEvent.venue));
  metaParts.push(`<span class="status-chip ${isOpen ? 'status-open' : 'status-closed'}">${isOpen ? '● Open' : '✕ Closed'}</span>`);
  document.getElementById('hero-meta').innerHTML = metaParts.join('<span style="opacity:.3;margin:0 2px">·</span>');

  // Show view
  document.getElementById('single-event-view').style.display = '';

  // Form state
  if (!isOpen) {
    document.getElementById('form-body').innerHTML = `
      <div class="closed-notice">
        <strong>Registrations are closed</strong>
        Entries for this event are no longer being accepted.
      </div>`;
  }

  // Entries
  renderEntries();
}

function renderEntries() {
  const chip = document.getElementById('count-chip');
  const list = document.getElementById('entries-list');
  const capBar = document.getElementById('capacity-bar');
  const count = entries.length;
  chip.textContent = count + (currentEvent?.capacity ? '/' + currentEvent.capacity : '');

  if (!count) {
    list.innerHTML = '<div class="entries-empty">No registrations yet — be the first!</div>';
  } else {
    list.innerHTML = entries.map((e, i) => `
      <div class="entry-row">
        <span class="entry-num">${i + 1}</span>
        <span class="entry-name">${esc(e.name)}</span>
        <span class="entry-time">${fmtRelTime(e.submitted_at)}</span>
      </div>`).join('');
  }

  if (currentEvent?.capacity) {
    capBar.style.display = '';
    const pct = Math.min(100, Math.round((count / currentEvent.capacity) * 100));
    document.getElementById('cap-text').textContent = count + ' of ' + currentEvent.capacity;
    document.getElementById('cap-fill').style.width = pct + '%';
  }
}

async function submitEntry() {
  const name  = document.getElementById('f-name').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const notes = document.getElementById('f-notes').value.trim();
  const errEl = document.getElementById('form-err');
  const btn   = document.getElementById('submit-btn');

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Submitting…';

  const { data, error } = await db.rpc('submit_registration', {
    p_event_id: currentEvent.id,
    p_name: name, p_phone: phone,
    p_email: email || null, p_notes: notes || null
  });

  btn.disabled = false;
  btn.textContent = 'Confirm registration';

  if (error || !data?.success) {
    errEl.textContent = data?.message || error?.message || 'Something went wrong.';
    errEl.style.display = 'block';
    return;
  }

  // Success — replace form with confirmation
  document.getElementById('form-body').innerHTML = `
    <div class="success-state">
      <div class="check">🎾</div>
      <h3>You're in, ${esc(name)}!</h3>
      <p>Your spot is confirmed. We'll be in touch on WhatsApp closer to the event.</p>
    </div>`;

  // Refresh entries list
  const { data: fresh } = await db.rpc('get_event_registrations', { p_event_id: currentEvent.id });
  entries = fresh || [];
  renderEntries();
}

async function loadAllEvents() {
  document.getElementById('all-events-view').style.display = '';
  document.getElementById('hero-title').textContent = 'Open Registrations';

  const { data } = await db.rpc('get_open_registration_events');
  const grid = document.getElementById('events-grid');

  if (!data?.length) {
    grid.innerHTML = '<p style="color:var(--ink-2);font-size:15px">No events open for registration right now. Check back soon.</p>';
    return;
  }

  grid.innerHTML = data.map(e => {
    const spotsLeft = e.capacity ? (e.capacity - Number(e.entry_count)) : null;
    return `<a href="/register.html?event=${e.id}" class="event-card">
      <span class="type-chip">${capitalize(e.event_type)}</span>
      <h3>${esc(e.name)}</h3>
      <div class="ev-meta">
        ${e.event_date ? '<span>📅 ' + fmtEventDate(e.event_date) + '</span>' : ''}
        ${e.venue ? '<span>📍 ' + esc(e.venue) + '</span>' : ''}
        <span>👥 ${e.entry_count} registered${spotsLeft !== null ? ' · ' + spotsLeft + ' spots left' : ''}</span>
      </div>
      <span class="ev-cta">Register now →</span>
    </a>`;
  }).join('');
}

function capitalize(s) { return s ? s.charAt(0).toUpperCase() + s.slice(1) : ''; }

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtEventDate(dateStr) {
  return new Date(dateStr + 'T00:00:00').toLocaleDateString('en-IN', { weekday:'short', day:'numeric', month:'short', year:'numeric' });
}

function fmtRelTime(iso) {
  const diff = Date.now() - new Date(iso);
  const m = Math.floor(diff / 60000);
  if (m < 1) return 'just now';
  if (m < 60) return m + 'm ago';
  const h = Math.floor(m / 60);
  if (h < 24) return h + 'h ago';
  return Math.floor(h / 24) + 'd ago';
}

init();
</script>
</body>
</html>
