<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Tennisnuts — The Social Side of Tennis</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root {
  --green: #3a5c2c;
  --green-2: #2c4621;
  --green-3: #4d7239;
  --green-soft: #eef2e6;
  --ball: #cddc39;
  --ball-2: #d8e85a;
  --ink: #1c2218;
  --ink-2: #4a5240;
  --paper: #ffffff;
  --cream: #faf8f1;
  --line: #e6e3d8;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: "DM Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  font-size: 17px;
  line-height: 1.55;
}
h1, h2, h3, h4 {
  font-family: "Bricolage Grotesque", "DM Sans", sans-serif;
  font-weight: 700;
  letter-spacing: -0.02em;
  margin: 0;
}
p { margin: 0; }
a { color: inherit; text-decoration: none; }
img, svg { display: block; max-width: 100%; }
button { font-family: inherit; cursor: pointer; border: 0; background: none; }
.container { max-width: 1240px; margin: 0 auto; padding: 0 28px; }

/* NAV */
.nav { position: sticky; top: 0; z-index: 50; background: rgba(255,255,255,0.92); backdrop-filter: saturate(140%) blur(10px); border-bottom: 1px solid var(--line); }
.nav-inner { display: flex; align-items: center; justify-content: space-between; height: 72px; gap: 24px; }
.brand { display: flex; align-items: center; }
.brand-logo { height: 56px; width: auto; display: block; object-fit: contain; }
.nav-links { display: flex; align-items: center; gap: 28px; font-weight: 500; font-size: 15px; }
.nav-links a { color: var(--ink-2); transition: color .15s; }
.nav-links a:hover { color: var(--green); }
.nav-cta { display: inline-flex; align-items: center; gap: 8px; padding: 10px 18px; border-radius: 999px; background: var(--green); color: #fff !important; font-weight: 600; font-size: 14px; transition: transform .15s, background .15s; }
.nav-cta:hover { background: var(--green-2); transform: translateY(-1px); }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 10px; padding: 16px 28px; border-radius: 999px; font-weight: 600; font-size: 16px; transition: transform .15s ease, background .15s, color .15s, box-shadow .15s; white-space: nowrap; cursor: pointer; }
.btn-primary { background: var(--green); color: #fff; box-shadow: 0 8px 24px -10px rgba(58,92,44,0.6); }
.btn-primary:hover { background: var(--green-2); transform: translateY(-2px); }
.btn-ghost { background: transparent; color: #fff; border: 1.5px solid rgba(255,255,255,0.7); }
.btn-ghost:hover { background: rgba(255,255,255,0.12); border-color: #fff; }
.btn-ball { background: var(--ball); color: var(--green-2); }
.btn-ball:hover { background: var(--ball-2); transform: translateY(-2px); }
.btn-small { padding: 10px 18px; font-size: 14px; }

/* HERO */
.hero { position: relative; min-height: 600px; color: #fff; overflow: hidden; isolation: isolate; display: flex; align-items: stretch; }
.hero-bg { position: absolute; inset: 0; z-index: -2; background: radial-gradient(ellipse at 78% 62%, rgba(0,0,0,0.55), transparent 45%), linear-gradient(180deg, rgba(58,92,44,0.55) 0%, rgba(34,52,22,0.85) 100%), repeating-linear-gradient(115deg, #6b8c4f 0 38px, #5d7d44 38px 78px), #4d7239; }
.hero-photo { position: absolute; inset: 0; z-index: -1; opacity: 0.55; background-image: linear-gradient(transparent 0, transparent calc(50% - 1px), rgba(255,255,255,0.35) calc(50% - 1px), rgba(255,255,255,0.35) calc(50% + 1px), transparent calc(50% + 1px)), linear-gradient(90deg, transparent 9%, rgba(255,255,255,0.25) 9%, rgba(255,255,255,0.25) calc(9% + 2px), transparent calc(9% + 2px), transparent 91%, rgba(255,255,255,0.25) 91%, rgba(255,255,255,0.25) calc(91% + 2px), transparent calc(91% + 2px)); transform: perspective(900px) rotateX(60deg) scale(1.6) translateY(40%); transform-origin: 50% 100%; filter: blur(0.5px); }
.hero-noise { position: absolute; inset: 0; z-index: -1; background: radial-gradient(circle at 20% 30%, rgba(205,220,57,0.15), transparent 40%), radial-gradient(circle at 85% 75%, rgba(0,0,0,0.4), transparent 50%); mix-blend-mode: overlay; }
.hero-content { position: relative; width: 100%; max-width: 760px; padding: 88px 0 100px; }
.hero-eyebrow { display: inline-flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.3); padding: 8px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; letter-spacing: 0.04em; backdrop-filter: blur(6px); margin-bottom: 28px; }
.hero-eyebrow .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--ball); box-shadow: 0 0 0 4px rgba(205,220,57,0.25); animation: pulse 1.8s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 4px rgba(205,220,57,0.25); } 50% { box-shadow: 0 0 0 8px rgba(205,220,57,0.05); } }
.hero h1 { font-size: clamp(48px, 7vw, 92px); line-height: 0.98; letter-spacing: -0.035em; margin-bottom: 24px; }
.hero h1 .accent { color: var(--ball); font-style: italic; font-weight: 700; position: relative; display: inline-block; }
.hero h1 .accent::after { content: ""; position: absolute; left: 0; right: 0; bottom: 6px; height: 10px; background: rgba(205,220,57,0.25); border-radius: 6px; z-index: -1; }
.hero-sub { font-size: 19px; line-height: 1.5; color: rgba(255,255,255,0.9); max-width: 520px; margin-bottom: 36px; }
.hero-ctas { display: flex; gap: 14px; flex-wrap: wrap; margin-bottom: 44px; }
.hero-stats { display: flex; gap: 36px; flex-wrap: wrap; }
.hero-stats .stat { border-left: 2px solid rgba(205,220,57,0.6); padding-left: 14px; }
.hero-stats .stat .num { font-family: "Bricolage Grotesque", sans-serif; font-size: 32px; font-weight: 700; line-height: 1; letter-spacing: -0.02em; }
.hero-stats .stat .label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.75); margin-top: 6px; }
.hero-ribbon { position: absolute; bottom: 0; left: 0; right: 0; height: 60px; background: var(--ball); display: flex; align-items: center; overflow: hidden; font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 18px; color: var(--green-2); }
.hero-ribbon .marquee { display: flex; gap: 28px; white-space: nowrap; animation: marquee 30s linear infinite; padding-left: 28px; }
.hero-ribbon span { display: inline-flex; align-items: center; gap: 28px; }
.hero-ribbon .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--green-2); display: inline-block; }
@keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

/* SECTIONS */
.section { padding: 110px 0; }
.section-eyebrow { display: inline-flex; align-items: center; gap: 10px; color: var(--green); font-weight: 600; font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 18px; }
.section-eyebrow::before { content: ""; width: 24px; height: 2px; background: var(--ball); }
.section h2 { font-size: clamp(36px, 4.4vw, 56px); line-height: 1.02; letter-spacing: -0.03em; margin-bottom: 18px; max-width: 16ch; }
.section-head { display: grid; grid-template-columns: 1.2fr 1fr; align-items: end; gap: 60px; margin-bottom: 60px; }
.section-head .right { font-size: 17px; color: var(--ink-2); }

/* WHO WE ARE */
.who { background: var(--cream); overflow: hidden; }
.who-grid { display: grid; grid-template-columns: 1fr 1.05fr; gap: 80px; align-items: center; }
.who-copy h2 { margin-bottom: 28px; }
.who-copy p { font-size: 18px; color: var(--ink-2); margin-bottom: 22px; max-width: 50ch; }
.who-tags { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 28px; }
.who-tag { padding: 10px 16px; border-radius: 999px; background: #fff; border: 1px solid var(--line); font-weight: 500; font-size: 14px; color: var(--green-2); display: inline-flex; align-items: center; gap: 8px; }
.who-tag .b { width: 8px; height: 8px; border-radius: 50%; background: var(--ball); }
.who-photo { position: relative; border-radius: 28px; aspect-ratio: 4/4.4; overflow: hidden; box-shadow: 0 30px 60px -25px rgba(58,92,44,0.5); }
.who-photo img { width: 100%; height: 100%; object-fit: cover; display: block; }
.who-right { position: relative; }
.who-badge { position: absolute; top: -22px; right: -22px; width: 140px; height: 140px; border-radius: 50%; background: var(--green); color: #fff; display: flex; align-items: center; justify-content: center; text-align: center; font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 13px; line-height: 1.2; letter-spacing: 0.04em; text-transform: uppercase; box-shadow: 0 16px 30px -10px rgba(58,92,44,0.4); animation: spin 22s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.who-badge .core { position: absolute; inset: 22px; border-radius: 50%; background: var(--ball); display: flex; align-items: center; justify-content: center; color: var(--green-2); font-size: 36px; animation: spin 22s linear infinite reverse; }

/* ACTIVITIES */
.activities { background: #fff; }
.act-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
.act-card { border-radius: 20px; background: #fff; border: 1px solid var(--line); overflow: hidden; display: flex; flex-direction: column; transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease; cursor: pointer; }
.act-card:hover { transform: translateY(-6px); box-shadow: 0 24px 50px -25px rgba(58,92,44,0.35); border-color: var(--green); }
.act-card .head { background: var(--green); color: #fff; padding: 18px 18px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.act-card .icon { width: 44px; height: 44px; border-radius: 12px; background: rgba(205,220,57,0.18); display: flex; align-items: center; justify-content: center; color: var(--ball); }
.act-card .num { font-family: "JetBrains Mono", monospace; font-size: 12px; opacity: 0.6; }
.act-card .body { padding: 22px 20px 24px; flex: 1; display: flex; flex-direction: column; gap: 8px; }
.act-card h3 { font-size: 20px; letter-spacing: -0.02em; }
.act-card p { font-size: 14.5px; color: var(--ink-2); line-height: 1.45; }
.act-card .more { margin-top: auto; padding-top: 16px; font-size: 13px; font-weight: 600; color: var(--green); display: inline-flex; align-items: center; gap: 6px; transition: gap .15s; }
.act-card:hover .more { gap: 10px; }

/* EVENTS */

/* TESTIMONIALS */

/* PARTNERS */
.partners { background: #fff; padding: 80px 0; border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); }
.partners-row { display: grid; grid-template-columns: 220px 1fr; gap: 60px; align-items: center; }
.partners-row h3 { font-size: 16px; font-weight: 600; color: var(--ink-2); letter-spacing: 0.04em; }
.partners-row h3 span { display: block; color: var(--green); font-family: "Bricolage Grotesque", sans-serif; font-size: 28px; letter-spacing: -0.02em; margin-top: 4px; }
.logos { display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; }
.logo-chip { font-family: "Bricolage Grotesque", sans-serif; font-weight: 700; font-size: 22px; letter-spacing: -0.02em; color: #9aa192; display: inline-flex; align-items: center; gap: 8px; transition: color .2s; cursor: pointer; }
.logo-chip:hover { color: var(--green); }
.logo-chip .lm { width: 28px; height: 28px; border-radius: 7px; background: currentColor; opacity: 0.18; display: inline-block; flex: none; }
.logo-chip.b1 .lm { border-radius: 50%; }
.logo-chip.b3 .lm { transform: rotate(45deg); border-radius: 4px; }
.logo-chip.b4 .lm { border-radius: 50% 4px 50% 4px; }
.logo-chip.b5 .lm { border-radius: 14px 4px; }

/* JOIN */
.join { background: var(--green); color: #fff; padding: 100px 0; text-align: center; position: relative; overflow: hidden; }
.join::before { content: ""; position: absolute; inset: 0; background: repeating-linear-gradient(115deg, rgba(255,255,255,0.03) 0 28px, transparent 28px 56px); }
.join .container { position: relative; z-index: 1; }
.join h2 { font-size: clamp(36px, 5vw, 64px); color: #fff; margin-bottom: 20px; max-width: none; }
.join h2 .accent { color: var(--ball); font-style: italic; }
.join p { font-size: 19px; color: rgba(255,255,255,0.8); max-width: 52ch; margin: 0 auto 40px; }
.join-ctas { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }

/* FOOTER */
.footer { background: var(--green-2); color: rgba(255,255,255,0.85); padding: 80px 0 28px; position: relative; overflow: hidden; }
.footer::before { content: ""; position: absolute; top: 0; left: 0; right: 0; height: 8px; background: repeating-linear-gradient(90deg, var(--ball) 0 40px, var(--green-3) 40px 80px); }
.footer-grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 48px; margin-bottom: 60px; }
.footer-brand .brand-logo { height: 72px; }
.footer-brand p { margin-top: 22px; font-size: 15px; line-height: 1.55; max-width: 32ch; color: rgba(255,255,255,0.7); }
.footer-col h4 { font-size: 13px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ball); margin-bottom: 22px; font-family: "DM Sans", sans-serif; }
.footer-col ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
.footer-col li { font-size: 15px; color: rgba(255,255,255,0.7); }
.footer-col a { font-size: 15px; color: rgba(255,255,255,0.8); transition: color .15s; }
.footer-col a:hover { color: var(--ball); }

.footer-bottom { border-top: 1px solid rgba(255,255,255,0.12); padding-top: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; font-size: 13px; color: rgba(255,255,255,0.55); }
.socials { display: flex; gap: 10px; margin-top: 16px; }
.socials a,.socials-share-btn { width: 38px; height: 38px; border-radius: 50%; background: rgba(255,255,255,0.08); display: inline-flex; align-items: center; justify-content: center; transition: background .15s, color .15s; color: rgba(255,255,255,0.9); border: none; cursor: pointer; padding: 0; }
.hp-share-toast { opacity: 0; }
.hp-share-toast.visible { opacity: 1 !important; transform: translateX(-50%) translateY(0) !important; }
.socials a:hover { background: var(--ball); color: var(--green-2); }

/* HAPPENING — auto-scroll strip */
.happening { background: #0e1810; padding: 100px 0 0; overflow: hidden; }
.happening-head { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: end; margin-bottom: 52px; }
.happening-sub { font-size: 17px; color: rgba(255,255,255,.6); line-height: 1.6; max-width: 40ch; }
.happening h2 { color: #fff; }
.happening .section-eyebrow { color: var(--ball); }
.happening .section-eyebrow::before { background: var(--ball); }
.tour-strip { overflow: hidden; padding-bottom: 80px; }
.tour-track { display: flex; gap: 18px; width: max-content; animation: tourScroll 45s linear infinite; }
.tour-track:hover { animation-play-state: paused; }
@keyframes tourScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.t-card {
  flex: 0 0 360px; height: 400px; border-radius: 20px; overflow: hidden;
  position: relative; text-decoration: none; display: block;
  box-shadow: 0 20px 50px -16px rgba(0,0,0,0.55);
  transition: transform .25s ease, box-shadow .25s ease;
}
.t-card:hover { transform: translateY(-8px) scale(1.02); box-shadow: 0 32px 64px -20px rgba(0,0,0,0.7); }
.t-bg { position: absolute; inset: 0; }
.t-bg img { width: 100%; height: 100%; object-fit: cover; display: block; }
.t-grad { position: absolute; inset: 0; background: linear-gradient(to top, rgba(14,24,16,.98) 0%, rgba(14,24,16,.4) 50%, transparent 100%); }
.t-body { position: absolute; bottom: 0; left: 0; right: 0; padding: 24px 24px 28px; color: #fff; }
.t-chip { display: inline-flex; align-items: center; padding: 4px 11px; background: var(--ball); color: var(--green-2); font-family: "JetBrains Mono", monospace; font-size: 9px; font-weight: 600; letter-spacing: .14em; text-transform: uppercase; border-radius: 999px; margin-bottom: 12px; }
.t-date { font-family: "JetBrains Mono", monospace; font-size: 10px; color: rgba(255,255,255,.5); margin-left: 8px; }
.t-title { font-family: "Bricolage Grotesque", sans-serif; font-size: 24px; font-weight: 700; letter-spacing: -.03em; line-height: 1.1; }

/* MOBILE NAV */
html, body { overflow-x: hidden; max-width: 100%; }
.nav-burger { display: none; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 10px 8px; border-radius: 8px; transition: background .15s; }
.nav-burger:hover { background: #f5f8ef; }
.nav-burger span { display: block; width: 24px; height: 2px; background: var(--ink); border-radius: 2px; transition: all .25s; }
.nav-burger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.nav-burger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
.nav-burger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-menu { position: absolute; top: 72px; left: 0; right: 0; background: #fff; border-bottom: 1px solid var(--line); padding: 12px 20px 20px; display: none; flex-direction: column; gap: 2px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); z-index: 99; }
.mobile-menu.open { display: flex; }
.mobile-menu a { display: block; padding: 12px 14px; border-radius: 8px; color: var(--ink); font-size: 16px; font-weight: 500; transition: background .12s; text-decoration: none; }
.mobile-menu a:hover { background: #f5f8ef; color: var(--green); }
.mobile-menu .mob-divider { height: 1px; background: var(--line); margin: 6px 0; }
.mobile-menu .mob-label { padding: 10px 14px 2px; font-size: 11px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #9aa192; }

/* RESPONSIVE */
@media (max-width: 960px) {
  .happening-head { grid-template-columns: 1fr; gap: 14px; }
  .happening { padding: 80px 0 0; }
  .t-card { flex: 0 0 260px; height: 340px; }
  .t-title { font-size: 20px; }
  .nav-links { display: none; }
  .nav-burger { display: flex; }
  .nav-cta { display: none !important; }
  .hero-content { padding: 64px 0 88px; }
  .who-grid { grid-template-columns: 1fr; gap: 48px; }
  .section-head { grid-template-columns: 1fr; gap: 16px; }
  .act-grid { grid-template-columns: repeat(2, 1fr); }
  .partners-row { grid-template-columns: 1fr; gap: 28px; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .section { padding: 80px 0; }
}
@media (max-width: 560px) {
  .act-grid { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; }
  .hero h1 { font-size: 48px; }
  .join-ctas { flex-direction: column; align-items: center; }
}
</style>
</head>

<div id="root"></div>

<script src="/predictions/config.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>

<script type="text/babel">
const { useState } = React;

const Ic = {
  Arrow: (p) => <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...p}><path d="M5 12h14M13 6l6 6-6 6"/></svg>,

                const url = window.location.href;
                const title = document.title;
                if (navigator.share) {
                  navigator.share({ title, url }).catch(() => {});
                } else if (navigator.clipboard) {
                  navigator.clipboard.writeText(url).then(() => {
                    const t = document.getElementById('hp-share-toast');
                    if (t) { t.classList.add('visible'); clearTimeout(t._t); t._t = setTimeout(() => t.classList.remove('visible'), 2200); }
                  });
                }
              }}><svg width="15" height="15" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" viewBox="0 0 24 24"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg></button>
            </div>
          </div>
        </div>
        <div className="footer-bottom">
          <div>© 2026 Tennisnuts Community · Pune, India · All rights reserved.</div>
          <div>Built by players, for players.</div>
          <a href="/predictions/admin.html" style={{color:'rgba(255,255,255,.2)',fontSize:11,letterSpacing:'.05em',transition:'color .15s'}} onMouseOver={e=>e.target.style.color='rgba(255,255,255,.5)'} onMouseOut={e=>e.target.style.color='rgba(255,255,255,.2)'}>Admin ↗</a>
        </div>
        <div id="hp-share-toast" style={{position:'fixed',bottom:28,left:'50%',transform:'translateX(-50%) translateY(10px)',background:'#1c2218',color:'#fff',fontSize:13,fontWeight:600,padding:'10px 22px',borderRadius:999,opacity:0,transition:'opacity .2s,transform .2s',pointerEvents:'none',zIndex:9999,whiteSpace:'nowrap'}} className="hp-share-toast">✓ Link copied!</div>
      </div>
    </footer>
  );
}

function AnnouncementBanner() {
  const [events, setEvents] = React.useState([]);
  const [hidden, setHidden] = React.useState(new Set());
  React.useEffect(() => {
    if (typeof db === 'undefined') return;
    db.rpc('get_open_registration_events').then(({ data }) => {
      if (data?.length) setEvents(data);
    }).catch(() => {});
  }, []);
  const visible = events.filter(e => !hidden.has(e.id));
  if (!visible.length) return null;
  return (
    <div style={{background:'var(--ball)',color:'var(--green-2)'}}>
      {visible.map(e => {
        const spotsLeft = e.capacity ? (e.capacity - Number(e.entry_count)) : null;
        return (
          <div key={e.id} style={{padding:'10px 0',borderBottom:'1px solid rgba(44,70,33,.15)'}}>
            <div className="container" style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap'}}>
              <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap',fontSize:15}}>
                <span style={{fontFamily:'"JetBrains Mono",monospace',fontSize:10,fontWeight:600,letterSpacing:'.12em',textTransform:'uppercase',opacity:.65}}>Now open</span>
                <strong>{e.name}</strong>
                {e.event_date && <span style={{opacity:.7,fontSize:14}}>{new Date(e.event_date+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</span>}
                {spotsLeft !== null && <span style={{opacity:.7,fontSize:13}}>{spotsLeft} spots left</span>}
                <a href={'/register.html?event='+e.id} style={{fontWeight:700,color:'var(--green-2)',textDecoration:'underline',fontSize:14}}>Register →</a>
              </div>
              <button onClick={() => setHidden(new Set([...hidden, e.id]))} style={{background:'rgba(44,70,33,.15)',border:'none',cursor:'pointer',borderRadius:'50%',width:24,height:24,display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,color:'var(--green-2)',flexShrink:0}}>×</button>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function App() {
  return (
    <>
      <Nav/>
      <AnnouncementBanner/>
      <main>
        <Hero/>
        <Happening/>
        <Who/>
        <Activities/>
        <Partners/>
        <Join/>
      </main>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
